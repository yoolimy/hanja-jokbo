<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 한자 족보 검색기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>AI 한자 족보 검색기</h2>
    <p class="subtitle">모르면 부수(왼쪽/위)만 그려보세요!</p>

    <div class="main-workspace">
        <div class="canvas-area">
            <canvas id="canvas" width="300" height="300"></canvas>
            <div class="controls">
                <button class="clear-btn" onclick="clearAll()">지우기 (다시 쓰기)</button>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <div id="hanjaChoices">
        <div class="section-box ai-box">
            <div class="col-title" style="color: #d32f2f;">
                <span>🤖 AI 인식 결과</span>
                <span class="sub-desc">족보 수록 한자 및 부수 노출</span>
            </div>
            <div id="leftButtons">
                <div class="loading">캔버스에 한자나 부수를 써보세요.</div>
            </div>
        </div>

        <div class="section-box radical-box">
            <div class="col-title" style="color: #3f51b5;">
                <span>📝 부수 추천 기능</span>
                <span class="sub-desc">복잡한 한자는 부수만 쓰세요!</span>
            </div>
            <div id="rightButtons">
                <div class="loading">여기에 부수 기반 추천 한자가 뜹니다.</div>
            </div>
        </div>
    </div>
</div>

<div id="resultToast">복사 완료! 👍</div>

<!-- 데이터셋을 먼저 불러온 후 메인 로직 실행 -->
<script src="jokbo-data.js"></script>
<script src="script.js"></script>
</body>
</html>
